backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:

  - name: "about"
    label: "About Me"
    files:
      - label: "About Me"
        name: "about"
        file: "content/about.json"
        format: json
        fields:
          - { label: "Hero Role Line", name: "hero_role", widget: "string", hint: "Shown under your name on the homepage" }
          - { label: "Hero Description", name: "hero_desc", widget: "text", hint: "2–3 sentence intro on the homepage" }
          - { label: "Profile Photo", name: "photo", widget: "image", required: false }
          - { label: "About Paragraph 1", name: "p1", widget: "text" }
          - { label: "About Paragraph 2", name: "p2", widget: "text" }
          - { label: "About Paragraph 3", name: "p3", widget: "text" }
          - { label: "About Paragraph 4", name: "p4", widget: "text" }
          - label: "Skills"
            name: "skills"
            widget: "list"
            fields:
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Tags (comma separated)", name: "tags", widget: "string" }
              - { label: "Highlight colour", name: "highlight", widget: "boolean", default: false, hint: "Turn on for terracotta-highlighted tags" }

  - name: "experience"
    label: "Experience"
    files:
      - label: "Experience"
        name: "experience"
        file: "content/experience.json"
        format: json
        fields:
          - label: "Roles"
            name: "roles"
            widget: "list"
            fields:
              - { label: "Role Title", name: "role", widget: "string" }
              - { label: "Company", name: "company", widget: "string" }
              - { label: "Period", name: "period", widget: "string", hint: "e.g. Apr 2025 – Present" }
              - { label: "Bullet Points (one per line)", name: "points", widget: "text", hint: "One bullet point per line" }
              - { label: "Award / Recognition (optional)", name: "award", widget: "string", required: false }

  - name: "impact"
    label: "Social Impact"
    files:
      - label: "Social Impact"
        name: "impact"
        file: "content/impact.json"
        format: json
        fields:
          - label: "Roles"
            name: "roles"
            widget: "list"
            fields:
              - { label: "Period", name: "period", widget: "string" }
              - { label: "Role Title", name: "role", widget: "string" }
              - { label: "Organisation", name: "org", widget: "string" }
              - { label: "Description", name: "desc", widget: "text" }
              - { label: "Full width card", name: "wide", widget: "boolean", default: false }

  - name: "writing"
    label: "Writing / Blog"
    folder: "content/blog"
    create: true
    format: json
    identifier_field: "title"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Tag / Category", name: "tag", widget: "string" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Cover gradient (CSS)", name: "cover_css", widget: "string", default: "linear-gradient(135deg, #3d3830, #c4622d)", hint: "CSS gradient for the card top" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Published", name: "published", widget: "boolean", default: true }
      - { label: "Date", name: "date", widget: "datetime" }

  - name: "blog_index"
    label: "Writing Index (update when adding posts)"
    files:
      - label: "Blog Index"
        name: "blog_index"
        file: "content/blog-index.json"
        format: json
        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Tag", name: "tag", widget: "string" }
              - { label: "Excerpt", name: "excerpt", widget: "text" }
              - { label: "Cover gradient (CSS)", name: "cover_css", widget: "string", default: "linear-gradient(135deg, #3d3830, #c4622d)" }
              - { label: "Body", name: "body", widget: "markdown" }
              - { label: "Published", name: "published", widget: "boolean", default: true }

  - name: "contact"
    label: "Contact Info"
    files:
      - label: "Contact"
        name: "contact"
        file: "content/contact.json"
        format: json
        fields:
          - { label: "Email", name: "email", widget: "string" }
          - { label: "LinkedIn URL", name: "linkedin_url", widget: "string" }
          - { label: "LinkedIn Label", name: "linkedin_label", widget: "string" }
          - { label: "Contact intro text", name: "intro", widget: "text" }
